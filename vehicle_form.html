<!DOCTYPE html>
<html>
<head>
    <title>Add Vehicle</title>
</head>
<body>

<h1>Add Vehicle</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <label>Vehicle Images</label>

    <input
        type="file"
        name="images"
        multiple
    >

    <br><br>

    <button type="submit">
        Save Vehicle
    </button>

</form>

</body>
</html>
